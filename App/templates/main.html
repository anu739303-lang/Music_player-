<html>
   <head>
    <meta charset="utf-8"/>
    <title>
      music player
    </title>
   </head>
   <body>
    
 
    
      <div class="music-player">
        {% for item in page_obj %}
       <div class="cover">
        <img alt="" src="{{item.image.url}}"/>
       </div>

       <div class="titre">
        <h3>
         {{item.artist}}
        </h3>
        <h1>
         {{item.title}}
        </h1>
       </div>
       
       <center><a href="{% if page_obj.has_previous %}?page={{ page_obj.previous_page_number }}{% endif %}"><i class="fa fa-step-backward fa-2x"></i></a> &nbsp; &nbsp; &nbsp; <a href="{% if page_obj.has_next %}?page={{ page_obj.next_page_number }} {% endif %}"><i class="fa fa-step-forward fa-2x"></i></a></center>
       
      <div class="lecteur">
    <audio controls style="width:100%;">
        <source src="{{ item.audio_file.url }}" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    </div>
      </div>     
    

    <div class="right-section">
      <div class="lyrics-container">
        <div class="lyrics">
            <p id="song-lyrics" class="song-lyrics" data-lyrics="{{item.lyrics}}"></p>
        </div>
     </div>
    </div>
    
    
    {% endfor %}
.
   </body>
  </html>
